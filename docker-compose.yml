version: '3.8'
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: invoice_demo_db
    environment:
      POSTGRES_USER: invoice_user
      POSTGRES_PASSWORD: invoice_pass
      POSTGRES_DB: invoice_demo
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoice_user -d invoice_demo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
